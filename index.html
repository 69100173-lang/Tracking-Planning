<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Plan — Work Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: '#FBF8F1',
            ruled: '#DCE6EE',
            margin: '#D9635A',
            ink: '#2B2A28',
            inksoft: '#5C574F',
          },
          fontFamily: {
            hand: ['Mali', 'cursive'],
            body: ['Sarabun', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #FBF8F1;
      background-image: repeating-linear-gradient(#FBF8F1 0px, #FBF8F1 34px, #DCE6EE 35px);
      color: #2B2A28;
    }
    .margin-line { position: fixed; top: 0; bottom: 0; left: 72px; width: 2px; background: #D9635A; opacity: .45; z-index: 0; }
    @media (min-width: 768px) { .margin-line { left: 110px; } }

    .card-box { border: 1.6px solid #2B2A28; border-radius: 10px; background: #FFFDF9; }
    .task-check { accent-color: #D9635A; width: 16px; height: 16px; }

    .status-track { height: 8px; border-radius: 999px; background: #EDE6D8; border: 1.3px solid #2B2A28; overflow: hidden; }
    .status-fill { height: 100%; border-radius: 999px; transition: width .4s ease; }

    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .no-scrollbar::-webkit-scrollbar { display: none; }

    .timeline-line { position: absolute; top: 0; bottom: 0; right: 14px; width: 3px; background: #2B2A28; }
    .timeline-line::before { content:''; position:absolute; top:-6px; left:-9px; width:21px; height:16px; background: repeating-linear-gradient(60deg, #2B2A28, #2B2A28 2px, transparent 2px, transparent 5px); opacity:.7; transform: rotate(6deg); }

    .strike { text-decoration: line-through; opacity: .45; }

    .fade-in { animation: fadeIn .35s ease; }
    @keyframes fadeIn { from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

    .tag-badge { display:inline-flex; align-items:center; gap:5px; font-size:11px; padding:2px 8px; border-radius:999px; font-weight:600; white-space:nowrap; }

    input:focus, button:focus-visible, select:focus-visible { outline: 2px solid #D9635A; outline-offset: 1px; }
    ::selection { background:#D9635A; color:#FBF8F1; }

    /* UI สำหรับ PIN Overlay */
    #pin-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #1e1e2f;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    .pin-box {
      background: #2d2d44;
      padding: 30px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      max-width: 320px;
      width: 90%;
    }
    .pin-box input[type="password"] {
      font-size: 24px;
      letter-spacing: 8px;
      text-align: center;
      width: 180px;
      padding: 10px;
      border-radius: 8px;
      border: 2px solid #4e4e6a;
      outline: none;
      margin-bottom: 15px;
      color: #ffffff !important;
      background: #1e1e2f;
    }
    .pin-box button.btn-primary {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
      width: 100%;
    }
    .pin-box button.btn-primary:hover { background: #4338ca; }
    #error-msg { color: #ff6b6b; margin-top: 10px; font-size: 13px; word-break: break-all; }
  </style>
</head>
<body class="font-body">

  <!-- 🔒 1. หน้าจอเด้งขอกรอก PIN -->
  <div id="pin-overlay">
    <div class="pin-box">
      <h2 class="text-xl font-bold mb-2">🔒 กรุณากรอกรหัสผ่าน</h2>
      <p class="text-xs text-gray-300 mb-4">ใส่รหัสผ่าน 6 หลักเพื่อเข้าใช้งานระบบ</p>
      <input type="password" id="pinInput" maxlength="6" placeholder="••••••">
      <br>
      <button onclick="verifyPin()" class="btn-primary">ยืนยันรหัสผ่าน</button>
      <p id="error-msg"></p>
      
      <div class="mt-6 pt-4 border-t border-gray-700 flex flex-col gap-2">
        <button onclick="promptChangeUrl()" class="text-xs text-gray-400 hover:text-white underline">⚙️ แก้ไข Web App URL</button>
        <button onclick="unlockApp()" class="text-xs text-gray-500 hover:text-gray-300">🔓 ข้ามการล็อกอิน (โหมดออฟไลน์)</button>
      </div>
    </div>
  </div>

  <!-- 🌐 2. เนื้อหาเว็บหลัก (ซ่อนไว้รอปลดล็อก) -->
  <div id="main-app" style="display: none;">
    <div class="margin-line"></div>

    <div class="relative z-10 max-w-4xl mx-auto px-6 md:px-10 py-10 md:py-14">

      <div class="flex items-start justify-between mb-10 gap-4">
        <h1 class="font-hand text-4xl md:text-5xl text-ink">Life Plan</h1>

        <div class="relative">
          <button id="addProjectBtn" class="flex items-center gap-2 bg-ink text-paper px-4 py-2 rounded-full text-sm font-semibold shadow-sm hover:brightness-110 active:scale-95 transition whitespace-nowrap">
            <span class="text-base leading-none">+</span> เพิ่มโปรเจกต์
          </button>
          <form id="addProjectForm" class="hidden fade-in absolute right-0 mt-2 card-box p-3 flex gap-2 z-20 w-64">
            <input type="text" id="newProjectName" placeholder="ชื่อโปรเจกต์" required class="flex-1 min-w-0 text-sm border-b border-ink/30 bg-transparent py-1 focus:outline-none focus:border-ink">
            <button type="submit" class="bg-ink text-paper px-3 py-1 rounded-lg text-xs font-medium shrink-0">เพิ่ม</button>
          </form>
        </div>
      </div>

      <section class="mb-14">
        <div class="flex items-center gap-2 mb-1">
          <h2 class="font-hand text-2xl text-ink">สถานะงาน คร่าวๆ</h2>
          <svg width="15" height="15" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.5 4.5L14 7l-4.5 1.5L8 13l-1.5-4.5L2 7l4.5-1.5L8 1z" fill="#D9635A"/></svg>
        </div>

        <div id="projectGrid" class="flex overflow-x-auto snap-x snap-mandatory gap-4 mb-2 pb-2 no-scrollbar sm:grid sm:grid-cols-3 sm:overflow-visible sm:snap-none"></div>
        <div id="projectDots" class="flex justify-center gap-1.5 mb-5 sm:hidden"></div>

        <div class="flex items-center gap-3 mb-6">
          <div class="status-track flex-1"><div class="status-fill" id="overallFill" style="width:0%; background:#2B2A28"></div></div>
          <span class="text-xs text-inksoft whitespace-nowrap w-16 text-right" id="overallLabel">0% รวม</span>
        </div>

        <div class="border-2 border-margin rounded-xl px-4 py-3" style="background:#FDF2F1;">
          <p class="text-sm font-bold text-margin mb-2 flex items-center gap-1.5">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M8 1l1.5 4.5L14 7l-4.5 1.5L8 13l-1.5-4.5L2 7l4.5-1.5L8 1z" fill="#D9635A"/></svg>
            AI สรุปผล
          </p>
          <div id="aiSummaryText" class="flex flex-col gap-1.5 text-sm text-inksoft"></div>
        </div>
      </section>

      <section class="mb-14">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-hand text-2xl text-ink flex items-center gap-2">
            Timeline
            <button id="addTimelineBtn" class="w-6 h-6 rounded-full border-2 border-ink text-ink text-sm leading-none flex items-center justify-center hover:bg-ink hover:text-paper transition">+</button>
          </h2>
          <svg width="26" height="26" viewBox="0 0 26 26" fill="none"><rect x="3" y="5" width="20" height="18" rx="2" stroke="#2B2A28" stroke-width="1.4"/><path d="M3 10h20M8 3v4M18 3v4" stroke="#2B2A28" stroke-width="1.4" stroke-linecap="round"/></svg>
        </div>

        <div class="relative pr-8" id="timelineWrap">
          <div class="timeline-line"></div>
          <div id="timelineList" class="flex flex-col gap-3"></div>
        </div>

        <form id="timelineForm" class="hidden mt-3 flex flex-wrap gap-2 fade-in">
          <input type="date" id="timelineDate" required class="card-box px-3 py-2 text-sm">
          <input type="text" id="timelineText" placeholder="รายละเอียด เช่น ส่งงาน" required class="card-box flex-1 min-w-[160px] px-3 py-2 text-sm">
          <select id="timelineProject" class="card-box px-3 py-2 text-sm"></select>
          <button type="submit" class="bg-ink text-paper px-4 py-2 rounded-lg text-sm font-medium">เพิ่ม</button>
        </form>
      </section>

      <section class="mb-10">
        <div class="flex items-center justify-between mb-5">
          <h2 class="font-hand text-2xl text-ink flex items-center gap-2">
            Must-do-list
            <button id="addTodoBtn" class="w-6 h-6 rounded-full border-2 border-ink text-ink text-sm leading-none flex items-center justify-center hover:bg-ink hover:text-paper transition">+</button>
          </h2>
          <span class="font-hand text-xl text-ink">Deadline</span>
        </div>

        <div id="todoList" class="flex flex-col gap-3"></div>

        <form id="todoForm" class="hidden mt-3 flex flex-wrap gap-2 fade-in">
          <input type="text" id="todoText" placeholder="รายละเอียดงาน" required class="card-box flex-1 min-w-[160px] px-3 py-2 text-sm">
          <select id="todoProject" class="card-box px-3 py-2 text-sm"></select>
          <input type="date" id="todoDeadline" required class="card-box px-3 py-2 text-sm">
          <button type="submit" class="bg-ink text-paper px-4 py-2 rounded-lg text-sm font-medium">เพิ่ม</button>
        </form>
      </section>

      <div class="flex items-center justify-center gap-2">
        <p class="text-xs text-inksoft/70 text-center" id="persistNote">กำลังตรวจสอบสถานะการบันทึก…</p>
        <button id="sheetsSettingsBtn" class="text-xs text-inksoft/60 underline hover:text-ink shrink-0" aria-label="ตั้งค่า Google Sheets">ตั้งค่า Google Sheets</button>
        <button onclick="lockApp()" class="text-xs text-margin underline shrink-0 ml-2">🔒 ล็อกระบบ</button>
      </div>

      <form id="sheetsSettingsForm" class="hidden fade-in mt-3 card-box p-4 max-w-md mx-auto flex flex-col gap-2 text-sm">
        <label class="text-xs text-inksoft" for="sheetsUrlInput">Google Apps Script Web App URL</label>
        <input type="url" id="sheetsUrlInput" placeholder="https://script.google.com/macros/s/xxxxx/exec" class="card-box px-3 py-2 text-sm">
        <div class="flex gap-2 justify-end mt-1">
          <button type="button" id="sheetsUrlClear" class="px-3 py-1.5 rounded-lg text-xs font-medium border border-ink/30 text-inksoft hover:bg-ink/5">ล้างค่า</button>
          <button type="submit" class="bg-ink text-paper px-4 py-1.5 rounded-lg text-xs font-medium">บันทึก URL</button>
        </div>
        <p class="text-[11px] text-inksoft/60 leading-relaxed">วาง URL ของ Google Apps Script Web App ที่ deploy จาก Google Sheets ของคุณ</p>
      </form>
    </div>
  </div>

<script>
/* ---------------- Persistence (Google Sheets via Apps Script Web App) ---------------- */
const SHEETS_URL_KEY = 'lifePlanSheetsUrl';
const DEFAULT_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw3rtJFtAkuTNtythNx1qIT2mlyyc6y-C6TEkSxbw-G2X6Sflo1jtFFw0waS_mu6SMo/exec";

function getSheetsUrl(){ return localStorage.getItem(SHEETS_URL_KEY) || DEFAULT_WEB_APP_URL; }
function hasSheetsUrl(){ return !!getSheetsUrl(); }

function promptChangeUrl() {
  const currentUrl = getSheetsUrl();
  const newUrl = prompt("กรุณากรอก Google Apps Script Web App URL ใหม่:", currentUrl);
  if (newUrl !== null && newUrl.trim() !== "") {
    localStorage.setItem(SHEETS_URL_KEY, newUrl.trim());
    alert("บันทึก URL ใหม่เรียบร้อยแล้ว กรุณาลองกรอก PIN อีกครั้ง");
  }
}

/* ---------------- System Authentication (PIN Check) ---------------- */
async function verifyPin() {
  const pin = document.getElementById("pinInput").value;
  const errorMsg = document.getElementById("error-msg");
  const webAppUrl = getSheetsUrl();

  if (!webAppUrl) {
    errorMsg.innerText = "❌ กรุณาตั้งค่า Web App URL ในระบบก่อน";
    return;
  }

  if (pin.length !== 6) {
    errorMsg.innerText = "กรุณากรอกรหัสผ่านให้ครบ 6 หลัก";
    return;
  }

  errorMsg.style.color = "#aaa";
  errorMsg.innerText = "กำลังตรวจสอบรหัส...";

  try {
    const response = await fetch(`${webAppUrl}?pin=${encodeURIComponent(pin)}`);
    if (!response.ok) {
      throw new Error(`HTTP ${response.status}`);
    }
    const result = await response.json();

    if (result.success) {
      unlockApp();
    } else {
      errorMsg.style.color = "#ff6b6b";
      errorMsg.innerText = "❌ " + result.message;
      document.getElementById("pinInput").value = "";
    }
  } catch (err) {
    console.error(err);
    errorMsg.style.color = "#ff6b6b";
    errorMsg.innerText = "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ (" + err.message + ")";
  }
}

function unlockApp() {
  document.getElementById("pin-overlay").style.display = "none";
  document.getElementById("main-app").style.display = "block";
}

function lockApp() {
  document.getElementById("pinInput").value = "";
  document.getElementById("error-msg").innerText = "";
  document.getElementById("pin-overlay").style.display = "flex";
  document.getElementById("main-app").style.display = "none";
}

/* ---------------- Life Plan Tracker Logic ---------------- */
const colorPalette = ["#D9635A","#5A7FA6","#6B8F71","#B98A4E","#8C6BA6","#4E8C96"];
let nextProjectId = 4;

let projects = [
  { id:1, name:"โปรเจกต์ 1", color:colorPalette[0] },
  { id:2, name:"โปรเจกต์ 2", color:colorPalette[1] },
  { id:3, name:"โปรเจกต์ 3", color:colorPalette[2] },
];

let nextTimelineId = 5;
let timeline = [
  { id:1, date: "2026-07-23", text: "ส่งซื้อ", projectId: 1 },
  { id:2, date: "2026-07-24", text: "", projectId: null },
  { id:3, date: "2026-07-25", text: "ส่งงาน", projectId: 2 },
  { id:4, date: "2026-07-26", text: "วันประกาศ", projectId: null },
];

let nextTodoId = 4;
let todos = [
  { id:1, text: "ตรวจสอบเอกสารก่อนส่ง", deadline: "2026-08-07", done: false, projectId: 1 },
  { id:2, text: "หาข้อมูลเพิ่มเติม", deadline: "2026-08-05", done: false, projectId: 2 },
  { id:3, text: "นัดหมายทีมงานรอบสุดท้าย", deadline: "2026-08-08", done: false, projectId: 3 },
];

const thMonths = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."];
function fmtDate(iso){
  if(!iso) return {d:"--",m:"--"};
  const dt = new Date(iso + "T00:00:00");
  return { d: dt.getDate(), m: thMonths[dt.getMonth()] };
}
function fmtShort(iso){
  const dt = new Date(iso + "T00:00:00");
  return `${dt.getDate()} ${thMonths[dt.getMonth()]}`;
}
function projectById(id){ return projects.find(p=>p.id===id); }

function projectOptionsHTML(){
  let opts = `<option value="">ไม่ระบุโปรเจกต์</option>`;
  opts += projects.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  return opts;
}
function refreshProjectSelects(){
  document.getElementById('timelineProject').innerHTML = projectOptionsHTML();
  document.getElementById('todoProject').innerHTML = projectOptionsHTML();
}

function projectProgress(p){
  const items = todos.filter(t=>t.projectId===p.id);
  if(!items.length) return 0;
  return Math.round(items.filter(t=>t.done).length / items.length * 100);
}
function projectStatusLines(p){
  const items = todos.filter(t=>t.projectId===p.id);
  if(!items.length) return ["ยังไม่มีงานที่ระบุไว้"];
  const pending = items.filter(t=>!t.done);
  if(!pending.length) return ["เสร็จเรียบร้อยแล้ว 🎉"];
  const lines = pending.slice(0,2).map(t=>t.text);
  if(pending.length > 2) lines.push(`และอีก ${pending.length-2} งาน`);
  return lines;
}

function renderProjects(){
  const grid = document.getElementById('projectGrid');
  grid.innerHTML = projects.map((p) => {
    const pct = projectProgress(p);
    const lines = projectStatusLines(p);
    return `
    <div class="card-box p-4 relative w-[78%] shrink-0 snap-center sm:w-auto sm:shrink sm:snap-align-none">
      <button onclick="deleteProject(${p.id})" class="absolute top-2 right-2 text-inksoft/40 hover:text-margin text-sm leading-none" aria-label="ลบโปรเจกต์">×</button>
      <div class="flex items-center gap-2 mb-3">
        <span class="w-2.5 h-2.5 rounded-full shrink-0" style="background:${p.color}"></span>
        <p class="font-semibold text-sm">${p.name}</p>
      </div>
      <ul class="flex flex-col gap-1.5 mb-4 text-sm text-inksoft">
        ${lines.map(l => `<li class="flex gap-1.5"><span class="shrink-0">-</span><span>${l}</span></li>`).join('')}
      </ul>
      <div class="status-track"><div class="status-fill" style="width:${pct}%; background:${p.color}"></div></div>
      <p class="text-[11px] text-inksoft/70 mt-1 text-right">${pct}%</p>
    </div>`;
  }).join('');
  renderOverall();
  refreshProjectSelects();
  updateAISummary();
  setupProjectDots();
  saveState();
}

function setupProjectDots(){
  const dotsWrap = document.getElementById('projectDots');
  const slider = document.getElementById('projectGrid');
  const cards = [...slider.children];
  dotsWrap.innerHTML = projects.map((p,i) => `<button class="rounded-full transition-all" style="width:6px;height:6px;background:${p.color}" data-dot="${i}" aria-label="ไปที่ ${p.name}"></button>`).join('');
  const dots = [...dotsWrap.children];
  dots.forEach((d,i) => d.addEventListener('click', () => cards[i] && cards[i].scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'})));
  if(!cards.length) return;
  const setActive = (idx) => dots.forEach((d,i) => {
    d.style.opacity = i===idx ? '1' : '.35';
    d.style.transform = i===idx ? 'scale(1.5)' : 'scale(1)';
  });
  setActive(0);
  const io = new IntersectionObserver((entries) => {
    entries.forEach(e => { if(e.isIntersecting) setActive(cards.indexOf(e.target)); });
  }, { root: slider, threshold: 0.6 });
  cards.forEach(c => io.observe(c));
}
function deleteProject(pid){
  projects = projects.filter(p=>p.id!==pid);
  timeline.forEach(t=>{ if(t.projectId===pid) t.projectId=null; });
  todos.forEach(t=>{ if(t.projectId===pid) t.projectId=null; });
  renderProjects(); renderTimeline(); renderTodos();
}

function renderOverall(){
  const avg = projects.length ? Math.round(projects.reduce((s,p)=>s+projectProgress(p),0)/projects.length) : 0;
  document.getElementById('overallFill').style.width = avg + '%';
  document.getElementById('overallLabel').textContent = avg + '% รวม';
}

function renderTimeline(){
  const list = document.getElementById('timelineList');
  const sorted = [...timeline].sort((a,b)=> a.date.localeCompare(b.date));
  list.innerHTML = sorted.map((t) => {
    const {d,m} = fmtDate(t.date);
    const proj = t.projectId ? projectById(t.projectId) : null;
    return `
    <div class="card-box flex fade-in overflow-hidden">
      <div class="w-16 shrink-0 flex flex-col items-center justify-center border-r border-ink/40 py-3 text-center">
        <span class="text-lg font-semibold leading-none">${d}</span>
        <span class="text-[11px] text-inksoft">${m}</span>
      </div>
      <div class="flex-1 flex items-center justify-between gap-2 px-4 py-3 text-sm">
        <span>${t.text ? t.text : '<span class="text-inksoft/50 italic">— ไม่มีรายละเอียด —</span>'}</span>
        <div class="flex items-center gap-2 shrink-0">
          ${proj ? `<span class="tag-badge" style="background:${proj.color}22; color:${proj.color}"><span class="w-1.5 h-1.5 rounded-full" style="background:${proj.color}"></span>${proj.name}</span>` : ''}
          <button onclick="deleteTimelineItem(${t.id})" class="text-inksoft/40 hover:text-margin text-base leading-none" aria-label="ลบรายการ">×</button>
        </div>
      </div>
    </div>`;
  }).join('');
  updateAISummary();
  saveState();
}
function deleteTimelineItem(id){ timeline = timeline.filter(t=>t.id!==id); renderTimeline(); }

function renderTodos(){
  const list = document.getElementById('todoList');
  const sorted = [...todos].sort((a,b)=> a.deadline.localeCompare(b.deadline));
  list.innerHTML = sorted.map((t) => {
    const proj = t.projectId ? projectById(t.projectId) : null;
    return `
    <div class="card-box flex items-center justify-between gap-2 px-4 py-3 fade-in">
      <label class="flex items-center gap-3 text-sm cursor-pointer flex-1 min-w-0">
        <input type="checkbox" class="task-check shrink-0" ${t.done?'checked':''} onchange="toggleTodo(${t.id})">
        <span class="${t.done?'strike':''} truncate">${t.text}</span>
      </label>
      <div class="flex items-center gap-2 shrink-0">
        ${proj ? `<span class="tag-badge" style="background:${proj.color}22; color:${proj.color}"><span class="w-1.5 h-1.5 rounded-full" style="background:${proj.color}"></span>${proj.name}</span>` : ''}
        <span class="text-xs text-inksoft whitespace-nowrap">${fmtShort(t.deadline)}</span>
        <button onclick="deleteTodo(${t.id})" class="text-inksoft/40 hover:text-margin text-base leading-none" aria-label="ลบรายการ">×</button>
      </div>
    </div>`;
  }).join('');
  renderProjects();
}
function toggleTodo(id){ const t = todos.find(x=>x.id===id); t.done = !t.done; renderTodos(); }
function deleteTodo(id){ todos = todos.filter(t=>t.id!==id); renderTodos(); }

document.getElementById('addProjectBtn').addEventListener('click', ()=>{
  document.getElementById('addProjectForm').classList.toggle('hidden');
});
document.getElementById('addProjectForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  const name = document.getElementById('newProjectName').value.trim();
  if(!name) return;
  const color = colorPalette[(nextProjectId-1) % colorPalette.length];
  projects.push({ id: nextProjectId++, name, color });
  e.target.reset();
  document.getElementById('addProjectForm').classList.add('hidden');
  renderProjects();
});

document.getElementById('addTimelineBtn').addEventListener('click', ()=> {
  document.getElementById('timelineForm').classList.toggle('hidden');
});
document.getElementById('timelineForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  const date = document.getElementById('timelineDate').value;
  const text = document.getElementById('timelineText').value;
  const projectId = document.getElementById('timelineProject').value || null;
  timeline.push({id: nextTimelineId++, date, text, projectId: projectId ? Number(projectId) : null});
  e.target.reset();
  document.getElementById('timelineForm').classList.add('hidden');
  renderTimeline();
});

document.getElementById('addTodoBtn').addEventListener('click', ()=> {
  document.getElementById('todoForm').classList.toggle('hidden');
});
document.getElementById('todoForm').addEventListener('submit', (e)=>{
  e.preventDefault();
  const text = document.getElementById('todoText').value;
  const deadline = document.getElementById('todoDeadline').value;
  const projectId = document.getElementById('todoProject').value || null;
  todos.push({id: nextTodoId++, text, deadline, done:false, projectId: projectId ? Number(projectId) : null});
  e.target.reset();
  document.getElementById('todoForm').classList.add('hidden');
  renderTodos();
});

function updateAISummary(){
  const box = document.getElementById('aiSummaryText');
  if(!box) return;
  if(!projects.length){ box.innerHTML = `<p>ยังไม่มีโปรเจกต์ — กด "เพิ่มโปรเจกต์" เพื่อเริ่มติดตามงาน</p>`; return; }

  const avg = Math.round(projects.reduce((s,p)=>s+projectProgress(p),0)/projects.length);
  const sorted = [...projects].sort((a,b)=>projectProgress(a)-projectProgress(b));
  const behind = sorted[0];

  const today = new Date().toISOString().slice(0,10);
  const upcoming = [...timeline].filter(t=>t.date >= today).sort((a,b)=>a.date.localeCompare(b.date))[0];
  const nearestTodo = [...todos].filter(t=>!t.done).sort((a,b)=>a.deadline.localeCompare(b.deadline))[0];

  let lines = [`ภาพรวมคืบหน้าไปแล้ว ${avg}%`];
  if(behind && projects.length > 1) lines.push(`"${behind.name}" ควรเร่งมือที่สุด (${projectProgress(behind)}%)`);
  if(upcoming) lines.push(`งานถัดไป: ${fmtShort(upcoming.date)}${upcoming.text ? ' — '+upcoming.text : ''}`);
  if(nearestTodo) lines.push(`deadline ใกล้สุด: "${nearestTodo.text}" (${fmtShort(nearestTodo.deadline)})`);
  else lines.push(`ไม่มีงานค้างใน Must-do-list แล้ว 🎉`);

  box.innerHTML = `<p>${lines.join(' · ')}</p>`;
}

let saveTimer = null;

async function saveState(){
  if(!hasSheetsUrl()) { setPersistNote('unconfigured'); return; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    setPersistNote('saving');
    try {
      const payload = JSON.stringify({ projects, timeline, todos, nextProjectId, nextTimelineId, nextTodoId });
      const res = await fetch(getSheetsUrl(), {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: payload
      });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      setPersistNote('saved');
    } catch(e){
      console.error('save failed', e);
      setPersistNote('error');
    }
  }, 250);
}

async function loadState(){
  if(!hasSheetsUrl()) return false;
  try {
    const res = await fetch(getSheetsUrl(), { method: 'GET' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if(data.projects) projects = data.projects;
    if(data.timeline) timeline = data.timeline;
    if(data.todos) todos = data.todos;
    if(data.nextProjectId) nextProjectId = data.nextProjectId;
    if(data.nextTimelineId) nextTimelineId = data.nextTimelineId;
    if(data.nextTodoId) nextTodoId = data.nextTodoId;
    return true;
  } catch(e){
    console.error('load failed', e);
    setPersistNote('error');
  }
  return false;
}

function setPersistNote(state){
  const note = document.getElementById('persistNote');
  if(!note) return;
  if(state === 'unconfigured') note.textContent = 'ยังไม่ได้เชื่อมกับ Google Sheets — กด "ตั้งค่า Google Sheets" เพื่อใส่ URL';
  else if(state === 'error') note.textContent = 'เชื่อมต่อ Google Sheets ไม่สำเร็จ ตรวจสอบ URL หรือลองอีกครั้ง';
  else if(state === 'saving') note.textContent = 'กำลังบันทึกลง Google Sheets…';
  else if(state === 'saved') note.textContent = 'บันทึกลง Google Sheets ล่าสุดไว้แล้ว ✓';
  else note.textContent = 'ข้อมูลจะถูกบันทึกลง Google Sheets ให้อัตโนมัติทุกครั้งที่มีการเปลี่ยนแปลง';
}

/* Settings UI for the Apps Script Web App URL */
const sheetsSettingsBtn = document.getElementById('sheetsSettingsBtn');
const sheetsSettingsForm = document.getElementById('sheetsSettingsForm');
const sheetsUrlInput = document.getElementById('sheetsUrlInput');

sheetsSettingsBtn.addEventListener('click', () => {
  sheetsUrlInput.value = getSheetsUrl();
  sheetsSettingsForm.classList.toggle('hidden');
});

sheetsSettingsForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  const url = sheetsUrlInput.value.trim();
  if(url) localStorage.setItem(SHEETS_URL_KEY, url);
  sheetsSettingsForm.classList.add('hidden');
  setPersistNote(hasSheetsUrl() ? 'saving' : 'unconfigured');
  await loadState();
  renderProjects();
  renderTimeline();
  renderTodos();
  if(hasSheetsUrl()) setPersistNote('saved');
});

document.getElementById('sheetsUrlClear').addEventListener('click', () => {
  localStorage.removeItem(SHEETS_URL_KEY);
  sheetsUrlInput.value = '';
  setPersistNote('unconfigured');
});

/* Initialize Application */
(async function init(){
  // ล้างการบันทึกสถานะ Auth เก่าที่จำไว้
  localStorage.removeItem("isAuth");
  
  await loadState();
  renderProjects();
  renderTimeline();
  renderTodos();
  setPersistNote(hasSheetsUrl() ? 'saved' : 'unconfigured');
})();
</script>
